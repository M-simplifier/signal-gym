name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: signal-gym
          submodules: false

      - name: Checkout Asterism
        uses: actions/checkout@v4
        with:
          repository: M-simplifier/asterism
          path: asterism

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: signal-gym/package-lock.json

      - name: Install
        working-directory: signal-gym
        run: npm ci

      - name: Verify
        working-directory: signal-gym
        run: npm run verify
